<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark/Light Mode Toggle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Theme Switcher</h1>
        <p>Click the buttons below to toggle between light and dark modes</p>
        
        <div class="theme-toggle">
            <button id="lightBtn" class="btn light-btn" title="Light Mode">
                <img src="sun-line.png" alt="Light Mode" width="30" height="30">
            </button>
            <button id="darkBtn" class="btn dark-btn" title="Dark Mode">
                <img src="moon-line (2).png" alt="Dark Mode" width="30" height="30">
            </button>
        </div>
        
        <div class="content">
            <h2>Welcome to Theme Switcher</h2>
            <p>This is a simple dark/light mode toggle application. Your preference is automatically saved in your browser.</p>
            <p>Try clicking the sun or moon icons above to switch themes!</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
